<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Design Tutor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #09090f;
    --surface:   #111118;
    --border:    #1e1e2e;
    --accent:    #d4a847;
    --accent-dim:#7a5e1f;
    --text:      #e8e6df;
    --muted:     #555566;
    --user-bg:   #141420;
    --bot-bg:    #0f0f1a;
    --radius:    2px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    flex-shrink: 0;
    padding: 20px 32px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
    position: relative;
    background: var(--surface);
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 32px;
    width: 48px; height: 2px;
    background: var(--accent);
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .logo span { color: var(--accent); }
  .tagline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* ── MESSAGES ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    padding: 0 32px;
    margin-bottom: 2px;
    animation: fadeUp 0.2s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message-inner {
    max-width: 760px;
    margin: 0 auto;
  }

  .message.user .bubble {
    background: var(--user-bg);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    padding: 14px 18px;
    border-radius: var(--radius);
    margin-left: auto;
    max-width: 85%;
    width: fit-content;
  }

  .message.bot .bubble {
    background: transparent;
    padding: 14px 0;
    line-height: 1.75;
  }

  .role-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
    color: var(--muted);
  }
  .message.user .role-label { text-align: right; }
  .message.bot  .role-label { color: var(--accent-dim); }

  .bubble p { margin-bottom: 10px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: #1a1a28;
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 2px;
    color: var(--accent);
  }
  .bubble pre {
    background: #0d0d18;
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent-dim);
    padding: 14px 16px;
    border-radius: var(--radius);
    overflow-x: auto;
    margin: 12px 0;
  }
  .bubble pre code {
    background: none;
    border: none;
    padding: 0;
    color: #c8c0a8;
  }

  /* sources */
  .sources {
    margin-top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .source-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 2px;
    letter-spacing: 0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 280px;
  }

  /* typing indicator */
  .typing .bubble {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 16px 0;
  }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent-dim);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40%           { opacity: 1;   transform: scale(1); }
  }

  /* ── INPUT ── */
  #input-area {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding: 16px 32px 20px;
    background: var(--surface);
  }
  .input-wrap {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    resize: none;
    outline: none;
    min-height: 48px;
    max-height: 160px;
    line-height: 1.5;
    transition: border-color 0.15s;
    overflow-y: auto;
  }
  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-color: var(--accent-dim); }

  button#send {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #09090f;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 0 18px;
    height: 48px;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  button#send:hover   { opacity: 0.85; }
  button#send:disabled { opacity: 0.35; cursor: not-allowed; }

  .hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-top: 10px;
    letter-spacing: 0.3px;
  }

  /* empty state */
  #empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    color: var(--muted);
    pointer-events: none;
    user-select: none;
  }
  #empty .glyph {
    font-size: 36px;
    opacity: 0.25;
  }
  #empty p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.5px;
  }
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 6px;
    pointer-events: all;
  }
  .suggestion {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 14px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .suggestion:hover { border-color: var(--accent-dim); color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="logo">System Design <span>Tutor</span></div>
  <div class="tagline">// RAG · DeepSeek · ChromaDB</div>
</header>

<div id="messages">
  <div id="empty">
    <div class="glyph">⬡</div>
    <p>ask a system design question</p>
    <div class="suggestions">
      <div class="suggestion" onclick="fillInput(this)">What is a load balancer?</div>
      <div class="suggestion" onclick="fillInput(this)">Explain CAP theorem</div>
      <div class="suggestion" onclick="fillInput(this)">How does consistent hashing work?</div>
      <div class="suggestion" onclick="fillInput(this)">Compare SQL vs NoSQL</div>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-wrap">
    <textarea id="q" rows="1" placeholder="Ask about distributed systems, databases, caching…" autofocus></textarea>
    <button id="send" onclick="sendMessage()">SEND</button>
  </div>
  <div class="hint">Enter to send · Shift+Enter for new line</div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const emptyEl    = document.getElementById('empty');
  const textarea   = document.getElementById('q');
  const sendBtn    = document.getElementById('send');
  let history = [];

  function fillInput(el) {
    textarea.value = el.textContent;
    textarea.focus();
    autoResize();
  }

  textarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  textarea.addEventListener('input', autoResize);

  function autoResize() {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
  }

  function addMessage(role, content, sources) {
    if (emptyEl) emptyEl.remove();

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const label = role === 'user' ? 'YOU' : 'TUTOR';
    let inner = `<div class="message-inner">
      <div class="role-label">${label}</div>
      <div class="bubble">${content}</div>
    </div>`;
    msg.innerHTML = inner;

    if (sources && sources.length) {
      const srcHtml = sources.map(s => {
        const name = s.split(/[\\/]/).pop();
        return `<span class="source-tag" title="${s}">${name}</span>`;
      }).join('');
      msg.querySelector('.bubble').insertAdjacentHTML(
        'beforeend', `<div class="sources">${srcHtml}</div>`
      );
    }

    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  function addTyping() {
    const msg = document.createElement('div');
    msg.className = 'message bot typing';
    msg.innerHTML = `<div class="message-inner">
      <div class="role-label">TUTOR</div>
      <div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div>`;
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatAnswer(text) {
    // code blocks
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
    // inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    // bold
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    // paragraphs
    return text.split(/\n{2,}/).map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
  }

  async function sendMessage() {
    const q = textarea.value.trim();
    if (!q || sendBtn.disabled) return;

    textarea.value = '';
    autoResize();
    sendBtn.disabled = true;

    addMessage('user', `<p>${escapeHtml(q)}</p>`, null);
    const typing = addTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q, history })
      });
      const data = await res.json();
      typing.remove();
      addMessage('bot', formatAnswer(data.answer), data.sources);
      history.push([q, data.answer]);
    } catch (err) {
      typing.remove();
      addMessage('bot', '<p>Error — could not reach the server.</p>', null);
    }

    sendBtn.disabled = false;
    textarea.focus();
  }
</script>
</body>
</html>
