<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Design Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #09090f;
    --surface:   #111118;
    --border:    #1e1e2e;
    --accent:    #d4a847;
    --accent-dim:#7a5e1f;
    --text:      #e8e6df;
    --muted:     #555566;
    --ok:        #4caf72;
    --bad:       #d05858;
    --radius:    2px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    flex-shrink: 0;
    padding: 20px 32px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
    position: relative;
    background: var(--surface);
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 32px;
    width: 48px; height: 2px;
    background: var(--accent);
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .logo span { color: var(--accent); }
  .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-left: auto;
  }

  /* ── SCROLL AREA ── */
  #stage {
    flex: 1;
    overflow-y: auto;
    scroll-behavior: smooth;
  }
  #stage::-webkit-scrollbar { width: 4px; }
  #stage::-webkit-scrollbar-track { background: transparent; }
  #stage::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeUp 0.25s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── START SCREEN ── */
  #start-screen .wrap { display: flex; flex-direction: column; align-items: center; gap: 22px; padding-top: 64px; }
  .glyph { font-size: 40px; opacity: 0.25; }
  .lead {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-align: center;
  }
  .topic-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    width: 100%;
    margin-top: 4px;
  }
  @media (max-width: 560px) { .topic-grid { grid-template-columns: 1fr; } }
  .topic-card {
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent-dim);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
  }
  .topic-card:hover { border-color: var(--accent); border-left-color: var(--accent); background: #141420; }
  .topic-card:active { transform: translateY(1px); }
  .topic-card .t-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .topic-card .t-desc {
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.5;
  }

  .btn {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #09090f;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 0 22px;
    height: 46px;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn.ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn.ghost:hover { border-color: var(--accent-dim); opacity: 1; }

  /* ── LOADING ── */
  #loading-screen .wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; padding-top: 120px; }
  .dots { display: flex; gap: 6px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-dim); animation: pulse 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40%           { opacity: 1;   transform: scale(1); }
  }

  /* ── QUESTIONS ── */
  .q-card {
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent-dim);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 16px;
    background: var(--surface);
  }
  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent-dim);
    margin-bottom: 8px;
  }
  .q-text { font-weight: 500; line-height: 1.55; margin-bottom: 14px; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    cursor: pointer;
    line-height: 1.5;
    transition: border-color 0.15s, background 0.15s;
  }
  .opt:last-child { margin-bottom: 0; }
  .opt:hover { border-color: var(--accent-dim); }
  .opt input { margin-top: 3px; accent-color: var(--accent); flex-shrink: 0; }
  .opt.selected { border-color: var(--accent); background: #141420; }
  .opt .key {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    flex-shrink: 0;
  }

  /* result states (review) */
  .opt.correct { border-color: var(--ok); background: rgba(76,175,114,0.08); }
  .opt.wrong   { border-color: var(--bad); background: rgba(208,88,88,0.08); }
  .opt .mark { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 12px; flex-shrink: 0; }
  .opt.correct .mark { color: var(--ok); }
  .opt.wrong   .mark { color: var(--bad); }
  .explain {
    margin-top: 12px;
    padding: 10px 12px;
    border-left: 2px solid var(--accent-dim);
    background: #0d0d18;
    font-size: 13px;
    line-height: 1.6;
    color: #c8c0a8;
    border-radius: var(--radius);
  }
  .explain b { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.5px; }

  /* ── SCORE ── */
  .score {
    text-align: center;
    margin-bottom: 28px;
  }
  .score .big {
    font-family: 'Playfair Display', serif;
    font-size: 56px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .score .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ── FOOTER BAR ── */
  #bar {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding: 14px 32px;
    background: var(--surface);
    display: none;
  }
  #bar.active { display: block; }
  .bar-inner {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .progress {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .bar-inner .spacer { flex: 1; }

  .error-box {
    border: 1px solid var(--bad);
    background: rgba(208,88,88,0.08);
    color: var(--bad);
    padding: 12px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    max-width: 520px;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <div class="logo">System Design <span>Quiz</span></div>
  <div class="meta" id="meta"></div>
</header>

<div id="stage">

  <!-- START -->
  <section id="start-screen" class="screen active">
    <div class="wrap">
      <div class="glyph">⬡</div>
      <div class="lead">choose a topic — get a 10-question quiz</div>
      <div class="topic-grid" id="topic-grid"></div>
      <div id="start-error"></div>
    </div>
  </section>

  <!-- LOADING -->
  <section id="loading-screen" class="screen">
    <div class="wrap">
      <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      <div class="lead" id="loading-text">generating your quiz…</div>
    </div>
  </section>

  <!-- QUESTIONS -->
  <section id="quiz-screen" class="screen">
    <div class="wrap"><div id="questions"></div></div>
  </section>

  <!-- RESULTS -->
  <section id="results-screen" class="screen">
    <div class="wrap">
      <div class="score">
        <div class="big" id="score-big">0/10</div>
        <div class="label" id="score-label"></div>
      </div>
      <div id="review"></div>
    </div>
  </section>

</div>

<!-- FOOTER BAR -->
<div id="bar">
  <div class="bar-inner">
    <div class="progress" id="progress"></div>
    <div class="spacer"></div>
    <button class="btn ghost" id="restart-btn" onclick="restart()" style="display:none">RESTART</button>
    <button class="btn" id="submit-btn" onclick="submitQuiz()" disabled>SUBMIT</button>
  </div>
</div>

<script>
  const TOPICS = [
    { name: 'Caching',                 desc: 'Cache strategies, eviction, CDNs, read/write-through' },
    { name: 'Load Balancing',          desc: 'L4/L7, algorithms, health checks, failover' },
    { name: 'Database Replication',    desc: 'Leader/follower, sync vs async, replication lag' },
    { name: 'Sharding & Partitioning', desc: 'Range vs hash partitioning, rebalancing, hot spots' },
    { name: 'CAP Theorem & Consistency', desc: 'Consistency models, trade-offs, eventual consistency' },
    { name: 'Consistent Hashing',      desc: 'Hash rings, virtual nodes, node add/remove' },
    { name: 'Message Queues & Kafka',  desc: 'Pub/sub, partitions, delivery guarantees, backpressure' },
    { name: 'Rate Limiting',           desc: 'Token bucket, leaky bucket, sliding window' },
    { name: 'Consensus & Leader Election', desc: 'Raft, Paxos, quorums, split brain' },
    { name: 'SQL vs NoSQL',            desc: 'Data models, ACID vs BASE, when to use each' },
  ];

  let quizId = null;
  let questions = [];
  let answers = {};

  const $ = id => document.getElementById(id);

  function show(screen) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $(screen).classList.add('active');
    $('stage').scrollTop = 0;
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderTopics() {
    $('topic-grid').innerHTML = TOPICS.map((t, i) => `
      <div class="topic-card" onclick="startQuiz(${i})">
        <div class="t-name">${escapeHtml(t.name)}</div>
        <div class="t-desc">${escapeHtml(t.desc)}</div>
      </div>`).join('');
  }
  renderTopics();

  async function startQuiz(topicIndex) {
    const topic = TOPICS[topicIndex].name;
    $('start-error').innerHTML = '';
    $('loading-text').textContent = `generating a quiz on “${topic}”…`;
    show('loading-screen');

    try {
      const res = await fetch('/quiz/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topic })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'failed to generate quiz');

      quizId = data.quiz_id;
      questions = data.questions;
      answers = {};
      renderQuestions(data.topic);
    } catch (err) {
      show('start-screen');
      $('start-error').innerHTML = `<div class="error-box">${escapeHtml(err.message)}</div>`;
    }
  }

  function renderQuestions(topic) {
    $('meta').textContent = topic ? `TOPIC: ${topic.toUpperCase()}` : '';
    const html = questions.map(q => {
      const opts = Object.keys(q.options).map(k => `
        <label class="opt" data-q="${q.id}" data-opt="${k}" onclick="selectOpt(${q.id}, '${k}')">
          <input type="radio" name="q${q.id}" value="${k}">
          <span class="key">${k}</span>
          <span>${escapeHtml(q.options[k])}</span>
        </label>`).join('');
      return `<div class="q-card">
        <div class="q-num">Question ${q.id + 1} / ${questions.length}</div>
        <div class="q-text">${escapeHtml(q.question)}</div>
        ${opts}
      </div>`;
    }).join('');
    $('questions').innerHTML = html;

    $('submit-btn').style.display = '';
    $('submit-btn').disabled = true;
    $('restart-btn').style.display = 'none';
    $('bar').classList.add('active');
    updateProgress();
    show('quiz-screen');
  }

  function selectOpt(qid, key) {
    answers[qid] = key;
    document.querySelectorAll(`.opt[data-q="${qid}"]`).forEach(el => {
      el.classList.toggle('selected', el.dataset.opt === key);
    });
    const input = document.querySelector(`input[name="q${qid}"][value="${key}"]`);
    if (input) input.checked = true;
    updateProgress();
  }

  function updateProgress() {
    const n = Object.keys(answers).length;
    $('progress').textContent = `${n} / ${questions.length} answered`;
    $('submit-btn').disabled = n < questions.length;
  }

  async function submitQuiz() {
    $('submit-btn').disabled = true;
    try {
      const res = await fetch('/quiz/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ quiz_id: quizId, answers })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'failed to submit');
      renderResults(data);
    } catch (err) {
      $('submit-btn').disabled = false;
      alert(err.message);
    }
  }

  function renderResults(data) {
    $('score-big').textContent = `${data.score}/${data.total}`;
    const pct = Math.round((data.score / data.total) * 100);
    let verdict = 'keep studying';
    if (pct >= 90) verdict = 'excellent';
    else if (pct >= 70) verdict = 'solid';
    else if (pct >= 50) verdict = 'getting there';
    $('score-label').textContent = `${pct}% · ${verdict}`;

    const html = data.results.map((r, i) => {
      const opts = Object.keys(r.options).map(k => {
        let cls = 'opt';
        let mark = '';
        if (k === r.correct_answer) { cls += ' correct'; mark = '✓ correct'; }
        else if (k === r.your_answer) { cls += ' wrong'; mark = '✗ your answer'; }
        return `<div class="${cls}">
          <span class="key">${k}</span>
          <span>${escapeHtml(r.options[k])}</span>
          ${mark ? `<span class="mark">${mark}</span>` : ''}
        </div>`;
      }).join('');
      const yourAns = r.your_answer || '—';
      return `<div class="q-card" style="border-left-color:${r.is_correct ? 'var(--ok)' : 'var(--bad)'}">
        <div class="q-num">Question ${i + 1} · ${r.is_correct ? 'CORRECT' : 'INCORRECT'} (you: ${yourAns})</div>
        <div class="q-text">${escapeHtml(r.question)}</div>
        ${opts}
        <div class="explain"><b>WHY</b><br>${escapeHtml(r.explanation)}</div>
      </div>`;
    }).join('');
    $('review').innerHTML = html;

    $('submit-btn').style.display = 'none';
    $('restart-btn').style.display = '';
    $('progress').textContent = `scored ${data.score} of ${data.total}`;
    $('bar').classList.add('active');
    show('results-screen');
  }

  function restart() {
    quizId = null;
    questions = [];
    answers = {};
    $('meta').textContent = '';
    $('bar').classList.remove('active');
    $('start-error').innerHTML = '';
    show('start-screen');
  }
</script>
</body>
</html>
